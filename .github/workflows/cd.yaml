name: CD Pipeline - Prod

on:
  push:
    branches:
      - prod

jobs:
  security-scan:
    name: "Job1 - Scan Securite"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build image pour scan
        run: docker build -t intranet-newdeal:prod .

      - name: Scan avec Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: intranet-newdeal:prod
          format: table
          exit-code: '1'
          severity: 'CRITICAL'

  deploy:
    name: "Job2 - Deploiement Production"
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy container port 80
        run: |
          docker stop intranet-newdeal || true
          docker rm intranet-newdeal || true
          docker build -t intranet-newdeal:prod .
          docker run -d --name intranet-newdeal -p 80:80 intranet-newdeal:prod

  notification:
    name: "Notification Email"
    runs-on: ubuntu-latest
    needs: [security-scan, deploy]
    if: always()
    steps:
      - name: Envoi email notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "CD Pipeline Prod - ${{ job.status }}"
          to: moussawade@groupeisi.com
          from: ${{ secrets.MAIL_USERNAME }}
          body: "Le pipeline CD s'est termine avec le statut : ${{ job.status }}"