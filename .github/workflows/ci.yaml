name: CI Pipeline - Dev

on:
  push:
    branches:
      - dev

jobs:
  build:
    name: "Job1 - Build Docker Image"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t boussom/intranet-newdeal:latest .

  security-scan:
    name: "Job2 - Scan Securite"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build image pour scan
        run: docker build -t intranet-newdeal:scan .

      - name: Scan vulnerabilites avec Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: intranet-newdeal:scan
          format: table
          exit-code: '0'

      - name: Scan secrets avec Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  push:
    name: "Job3 - Push vers Docker Hub"
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build et Push image
        run: |
          docker build -t boussom/intranet-newdeal:latest .
          docker push boussom/intranet-newdeal:latest